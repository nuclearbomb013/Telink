<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- Security Headers - Development CSP (allows localhost API) -->
    <!-- Note: frame-ancestors and X-Frame-Options are set via HTTP headers (backend + Vite config) -->
    <!-- They are intentionally omitted here as browsers ignore them in <meta> tags -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' blob: https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https: http://localhost:8000 http://127.0.0.1:8000; connect-src 'self' http://localhost:8000 http://127.0.0.1:8000 ws://localhost:5173; media-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://techink.dev" />
    
    <!-- SEO Meta Tags -->
    <title>TechInk - 技术交流社区</title>
    <meta name="description" content="TechInk 是一个专注于技术交流的社区，汇聚全球开发者分享编程经验、讨论前沿技术、探索创新思维。" />
    <meta name="keywords" content="技术交流, 编程, 开发者社区, 开源, 前端开发, 后端架构, 人工智能" />
    <meta name="author" content="TechInk Team" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://techink.dev" />
    <meta property="og:title" content="TechInk - 技术交流社区" />
    <meta property="og:description" content="TechInk 是一个专注于技术交流的社区，汇聚全球开发者分享编程经验、讨论前沿技术、探索创新思维。" />
    <meta property="og:image" content="/images/og-image.jpg" />
    <meta property="og:locale" content="zh_CN" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://techink.dev" />
    <meta name="twitter:title" content="TechInk - 技术交流社区" />
    <meta name="twitter:description" content="TechInk 是一个专注于技术交流的社区，汇聚全球开发者分享编程经验、讨论前沿技术、探索创新思维。" />
    <meta name="twitter:image" content="/images/og-image.jpg" />
    
    <!-- PWA / Mobile -->
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TechInk" />
    
    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    
    <!-- Fonts with display=swap — trimmed to only the weights actually used -->
    <link 
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;500;700&family=Roboto:wght@400;500&family=Noto+Serif+SC:wght@400;600&display=swap" 
      rel="stylesheet"
    >
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Preload Critical Assets -->
    <link rel="preload" href="/images/hero-code.webp" as="image" type="image/webp" fetchpriority="high">
  </head>
  <body>
    <div id="root"></div>
    
    <!-- No JavaScript Fallback -->
    <noscript>
      <style>
        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          max-width: 800px;
          margin: 0 auto;
          padding: 2rem;
          line-height: 1.6;
        }
        h1 { color: #000; }
        a { color: #0066cc; }
      </style>
      <h1>TechInk - 技术交流社区</h1>
      <p>欢迎使用 TechInk！我们的网站需要 JavaScript 才能正常运行。</p>
      <p>请启用 JavaScript 或升级您的浏览器以获得最佳体验。</p>
      <p>Welcome to TechInk! Our website requires JavaScript to function properly.</p>
      <p>Please enable JavaScript or upgrade your browser for the best experience.</p>
    </noscript>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
