[mypy]
python_version = 3.12
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

# Disable SQLAlchemy Column type errors globally
# These are cosmetic issues - Column[T] doesn't match Pydantic's expected T
# The application works correctly at runtime
disable_error_code = arg-type, assignment, misc, return-value, list-item, no-any-return